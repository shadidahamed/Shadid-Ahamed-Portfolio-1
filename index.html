<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Personal Profile</title>

<link rel="icon" href="portfolio link favicon.png">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="navbar">
  <button onclick="showSection('about')">About</button>
  <button onclick="showSection('academic')">Academic</button>
  <button onclick="showSection('lifestyle')">Lifestyle</button>
  <button onclick="showSection('achievements')">Achievements</button>
  <button onclick="showSection('hobby')">Hobby</button>
  <button onclick="showSection('likes')">Likes</button>
  <button onclick="showSection('videos')">Videos</button>
  <button onclick="showSection('contacts')">Contact</button>
  <button onclick="showSection('story')">Story</button>
  <button onclick="showSection('cv')">CV</button>
</div>

<!-- HERO -->
<div class="hero">
  <img src="Heroimage.png" alt="Profile" class="profile-img">
</div>

<!-- ABOUT -->
<div id="about" class="section active">
  <h2>About Me</h2>
 
  <p>I am a passionate web developer learning modern technologies.</p>
</div>

<!-- ACADEMIC -->
<div id="academic" class="section">
  <h2>Academic Background</h2>
  <p>Your academic details here.</p>
</div>

<!-- LIFESTYLE -->
<div id="lifestyle" class="section">
  <h2>Lifestyle</h2>
  
</div>

<!-- ACHIEVEMENTS -->
<div id="achievements" class="section">
  <h2>Achievements</h2>

</div>

<!-- HOBBY -->
<div id="hobby" class="section">
  <h2>Hobby</h2>

  <div class="slider">
     <img src="IMG scetch 1.jpg" class="section-img">
    <img src="image colour 1.jpg">
    <img src="image colour.jpg">
    <img src="Image-9.jpg" class="section-img">
    <img src="image sketch 1.jpg">
    <img src="image sketch 2.jpg">
    <img src="image sketch 3.jpg">
    <img src="image pc 1.png">
    <img src="image ipad 1.png">
  </div>

</div>

<!-- LIKES -->
<div id="likes" class="section">
  <h2>Likes & Dislikes</h2>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
  <h2>Videos</h2>



</div>

<!-- CONTACT -->
<div id="contacts" class="section contact-bg">
  <h2>Contact</h2>
  <p>Email | Facebook | Portfolio</p>
</div>

<!-- STORY -->
<div id="story" class="section">
  <h2>My Story</h2>
</div>

<!-- CV -->
<div id="cv" class="section">
  <h2>CV</h2>

  <img src="img 2.png">
  <img src="img 4.png">

</div>

<script>
function showSection(id) {
  const sections = document.querySelectorAll('.section');
  sections.forEach(sec => sec.classList.remove('active'));

  document.getElementById(id).classList.add('active');

  window.scrollTo({
    top: document.getElementById(id).offsetTop,
    behavior: 'smooth'
  });
}
</script>

</body>
</html>
